name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # nx project-graph loads vite.config.mts files which import
      # @capsuletech/{compliance,vite-builder}. Without their dist
      # the graph creation crashes. Mirror the bootstrap phases from
      # scripts/release.mjs: compliance → vite-builder, then anything.
      - name: Bootstrap shared builders
        run: |
          pnpm --filter @capsuletech/compliance build
          pnpm --filter @capsuletech/vite-builder build
      - run: pnpm nx run-many -t typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Bootstrap shared builders
        run: |
          pnpm --filter @capsuletech/compliance build
          pnpm --filter @capsuletech/vite-builder build
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Bootstrap shared builders
        run: |
          pnpm --filter @capsuletech/compliance build
          pnpm --filter @capsuletech/vite-builder build
      - run: pnpm nx run-many -t build
